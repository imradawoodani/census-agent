name: census-agent
region: nyc
services:
  - name: web
    github:
      repo: imradawoodani/census-agent
      branch: main
      deploy_on_push: true
    build_command: pip install -r requirements.txt
    run_command: uvicorn app.main:app --host 0.0.0.0 --port 8080
    instance_size_slug: basic-xs
    instance_count: 1
    http_port: 8080
    health_check:
      http_path: /api/health
    envs:
      - key: SNOWFLAKE_ACCOUNT
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: SNOWFLAKE_USER
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: SNOWFLAKE_PASSWORD
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: SNOWFLAKE_DATABASE
        scope: RUN_AND_BUILD_TIME
        value: US_OPEN_CENSUS
      - key: SNOWFLAKE_SCHEMA
        scope: RUN_AND_BUILD_TIME
        value: PUBLIC
      - key: SNOWFLAKE_WAREHOUSE
        scope: RUN_AND_BUILD_TIME
        value: COMPUTE_WH
      - key: DO_MODEL_ACCESS_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: COHERE_API_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: LOG_LEVEL
        scope: RUN_AND_BUILD_TIME
        value: INFO
      - key: LOG_FORMAT
        scope: RUN_AND_BUILD_TIME
        value: json
